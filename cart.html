<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - COSY AC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .cart-container {
            margin-top: 100px;
            background: #111;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #222;
        }

        .table {
            color: white;
            border-color: #333;
        }

        .brand-cyan {
            color: #00ffff;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container cart-container">
        <h2 class="mb-4">Shopping <span class="brand-cyan">Cart</span></h2>

        <div id="cart-content">
            <!-- Ye table hamesha yahan honi chahiye -->
            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cart-table-body">
                    <!-- Products yahan render honge -->
                </tbody>
            </table>

            <div id="cart-summary" class="d-flex justify-content-between align-items-center mt-4">
                <h4>Total: PKR <span id="cart-page-total">0</span></h4>
                <div>
                    <a href="index.html" class="btn btn-outline-light me-2">Back to Shop</a>
                    <button class="btn btn-info" onclick="processPurchase()">Checkout Now</button>
                </div>
            </div>
        </div>
        <!-- Empty message ke liye ek alag container -->
        <div id="empty-msg" class="text-center py-5 d-none">
            <h3 class="text-white">Your cart is empty</h3>
            <a href="index.html" class="btn btn-info mt-3">Go Shopping</a>
        </div>
    </div>

    <!-- Link your app.js here -->
    <script src="js/app.js"></script>
</body>

</html>
