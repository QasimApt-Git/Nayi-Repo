 <!-- ========== COMPARE ========== -->
  <section id="compare" class="section-dark py-5">
    <div class="container">
      <div class="section-header text-center mb-5">
        <p class="section-label">SIDE BY SIDE</p>
        <h2 class="section-title">Compare <span class="glow-text">Products</span></h2>
        <p class="section-sub">Select two products to compare features</p>
      </div>

      <div class="row g-3 mb-4 justify-content-center">
        <div class="col-md-5">
          <label class="form-label text-cyan">Product A</label>
          <select class="form-select select-glow" id="compareA">
            <option value="">-- Select Product --</option>
            <option value="samsung-windfree">Samsung WindFree Elite</option>
            <option value="samsung-classic">Samsung Wind-Free Classic</option>
            <option value="lg-dual">LG Dual Inverter Pro</option>
            <option value="daikin-streamer">Daikin Streamer X-Series</option>
            <option value="whirlpool-magicool">Whirlpool Magicool Pro</option>
            <option value="haier-cleancool">Haier CleanCool Ultra</option>
            <option value="gree-fairy">Gree Fairy Series</option>
          </select>
        </div>
        <div class="col-md-5">
          <label class="form-label text-cyan">Product B</label>
          <select class="form-select select-glow" id="compareB">
            <option value="">-- Select Product --</option>
            <option value="samsung-windfree">Samsung WindFree Elite</option>
            <option value="samsung-classic">Samsung Wind-Free Classic</option>
            <option value="lg-dual">LG Dual Inverter Pro</option>
            <option value="daikin-streamer">Daikin Streamer X-Series</option>
            <option value="whirlpool-magicool">Whirlpool Magicool Pro</option>
            <option value="haier-cleancool">Haier CleanCool Ultra</option>
            <option value="gree-fairy">Gree Fairy Series</option>
          </select>
        </div>
        <div class="col-md-2 d-flex align-items-end">
          <button class="btn btn-glow w-100" onclick="compareProducts()">Compare</button>
        </div>
      </div>

      <div id="compareResult" class="d-none">
        <div class="compare-table-wrap">
          <table class="table compare-table">
            <thead>
              <tr>
                <th>Feature</th>
                <th id="colA">Product A</th>
                <th id="colB">Product B</th>
              </tr>
            </thead>
            <tbody id="compareBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </section>
